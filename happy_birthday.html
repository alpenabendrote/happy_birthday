<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お誕生日おめでとう！夢のスタジアムホームラン</title>
<style>
  /* 画面全体のデザイン */
  body { 
    margin: 0; overflow: hidden; 
    background: #000;
    font-family: 'Hiragino Maru Gothic ProN', 'Meiryo', sans-serif;
    user-select: none;
  }
  
  /* 巨大スコアボード（電光掲示板） */
  #scoreboard {
    position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
    width: 80%; height: 25%;
    background: #111; border: 10px solid #333; border-radius: 5px;
    box-shadow: 0 0 30px rgba(0,0,0,1) inset, 0 10px 20px rgba(0,0,0,0.8);
    z-index: 5;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    color: #FFD700; font-weight: bold;
    opacity: 0.9;
  }
  #score-top { font-size: 20px; color: #bbb; margin-bottom: 5px; }
  #score-main { font-size: 40px; display: flex; gap: 20px; }
  .score-team { display: flex; flex-direction: column; align-items: center; }
  .score-val { 
    font-size: 60px; color: #FFF; text-shadow: 0 0 10px #FFD700; 
    transition: all 0.5s ease; /* スコアが変わる時のふわっとしたアニメーション */
  }

  /* 花火描画用キャンバス */
  #fireworksCanvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 10; pointer-events: none;
  }
  
  /* スタジアムのスタンド（遠景のシルエット） */
  #stands {
    position: absolute; bottom: 25%; width: 100%; height: 35%;
    background: radial-gradient(ellipse at bottom, rgba(50,50,50,0.5) 0%, rgba(10,10,10,0.5) 100%);
    clip-path: polygon(0% 0%, 10% 5%, 20% 0%, 30% 8%, 40% 0%, 50% 12%, 60% 0%, 70% 8%, 80% 0%, 90% 5%, 100% 0%, 100% 100%, 0% 100%);
    z-index: 1; pointer-events: none;
  }
  
  /* 点群観客用キャンバス */
  #stand-crowd {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 2; 
    pointer-events: none;
  }
  
  /* 手前の観客席（椅子） */
  #ground-seats {
    position: absolute; bottom: 0; width: 100%; height: 10%; 
    background-color: #1a1a1a; z-index: 3; pointer-events: none;
  }
  #ground-seats::before {
    content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    clip-path: polygon(
      0% 10%, 5% 10%, 5% 40%, 10% 40%, 10% 10%, 15% 10%, 15% 40%, 20% 40%, 20% 10%,
      25% 10%, 25% 40%, 30% 40%, 30% 10%, 35% 10%, 35% 40%, 40% 40%, 40% 10%,
      45% 10%, 45% 40%, 50% 40%, 50% 10%, 55% 10%, 55% 40%, 60% 40%, 60% 10%,
      65% 10%, 65% 40%, 70% 40%, 70% 10%, 75% 10%, 75% 40%, 80% 40%, 80% 10%,
      85% 10%, 85% 40%, 90% 40%, 90% 10%, 95% 10%, 95% 40%, 100% 40%, 100% 10%,
      100% 50%, 95% 50%, 95% 90%, 90% 90%, 90% 50%, 85% 50%, 85% 90%, 80% 90%, 80% 50%,
      75% 50%, 75% 90%, 70% 90%, 70% 50%, 65% 50%, 65% 90%, 60% 90%, 60% 50%,
      55% 50%, 55% 90%, 50% 90%, 50% 50%, 45% 50%, 45% 90%, 40% 90%, 40% 50%,
      35% 50%, 35% 90%, 30% 90%, 30% 50%, 25% 50%, 25% 90%, 20% 90%, 20% 50%,
      15% 50%, 15% 90%, 10% 90%, 10% 50%, 5% 50%, 5% 90%, 0% 90%, 0% 50%, 0% 10%
    );
    background-color: #2c3e50; 
    background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 1px, transparent 1px, transparent 25px);
    opacity: 0.9;
  }

  /* スタジアム照明（ナイター） */
  .light-group { position: absolute; top: 20px; z-index: 20; pointer-events: none; }
  .light-group.left { left: 5%; }
  .light-group.right { right: 5%; }
  .light {
    display: inline-block; width: 40px; height: 60px; background: #FFF; margin: 0 5px; border-radius: 3px;
    box-shadow: 0 0 50px rgba(255,255,255,1), 0 0 100px rgba(255,255,255,0.8); opacity: 0.9;
  }
  .light-row { display: flex; margin-bottom: 5px;}
  
  /* 野球のグラウンド */
  #field {
    position: absolute; bottom: 0; width: 100%; height: 25%;
    background: linear-gradient(to bottom, #2E8B57 0%, #2E8B57 60%, #8B4513 100%);
    border-top: 5px solid #fff; box-shadow: 0 -5px 15px rgba(0,0,0,0.8); z-index: 2;
  }
  
  /* 遊び方の説明文 */
  #instruction {
    position: absolute; top: 38%; width: 100%; text-align: center;
    font-size: 24px; font-weight: bold; color: white; text-shadow: 2px 2px 4px #000;
    pointer-events: none; z-index: 15;
  }
  
  /* ボール */
  #ball {
    position: absolute; width: 30px; height: 30px; background: white;
    border-radius: 50%; box-shadow: inset -5px -5px 10px rgba(0,0,0,0.3);
    left: 50%; top: 40%; transform: translate(-50%, -50%) scale(0.2);
    display: none; z-index: 5;
  }
  #ball::after, #ball::before {
    content: ''; position: absolute; width: 30px; height: 15px;
    border-radius: 50%; border: 2px solid red; border-color: red transparent transparent transparent;
  }
  #ball::before { top: 2px; left: -2px; transform: rotate(45deg); }
  #ball::after { bottom: 2px; right: -2px; transform: rotate(225deg); }
  
  /* バット */
  #bat-container {
    position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
    width: 100px; height: 100px; z-index: 15; pointer-events: none;
  }
  #bat {
    position: absolute; bottom: 0; right: 50%; width: 12px; height: 100px;
    background: #D2691E; border-radius: 6px;
    transform-origin: bottom right; transform: rotate(-20deg);
    transition: transform 0.1s ease-out; box-shadow: 2px 2px 5px rgba(0,0,0,0.8);
  }
  .swing { transform: rotate(130deg) !important; transition: transform 0.05s ease-in !important; }
  
  /* おめでとうメッセージ（画面中央、巨大、回転） */
  #main-message {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.1); 
    text-align: center; font-size: 100px; font-weight: bold; color: #FFF;
    text-shadow: 0 0 20px #FF1493, 0 0 30px #FF1493, 0 0 40px #FFD700; 
    opacity: 0; pointer-events: none; z-index: 40; 
    filter: drop-shadow(0 0 10px #FF1493); 
  }
  
  @keyframes boldMessage {
    0% { transform: translate(-50%, -50%) scale(0.1) rotate(0deg); opacity: 0; filter: drop-shadow(0 0 10px #FF1493); }
    50% { transform: translate(-50%, -50%) scale(1.5) rotate(720deg); opacity: 1; filter: drop-shadow(0 0 30px #FFD700) drop-shadow(0 0 50px #FF1493); }
    70% { transform: translate(-50%, -50%) scale(1.1) rotate(720deg); }
    100% { transform: translate(-50%, -50%) scale(1) rotate(720deg); opacity: 1; filter: drop-shadow(0 0 30px #FF1493) drop-shadow(0 0 50px #FFD700); }
  }

  .show-message { animation: boldMessage 2s ease-out forwards; }
  #sub-message { font-size: 50px; color: #FFD700; margin-top: 20px; text-shadow: 0 0 15px #FF4500, 0 0 25px #FFD700; }
</style>
</head>
<body>

<div id="scoreboard">
  <div id="score-info">
    <div id="score-top">BIRTHDAY CUP - FINAL</div>
    <div id="score-main">
      <div class="score-team"><span>GUEST</span><span class="score-val">0</span></div>
      <div class="score-team"><span>B-DAY</span><span id="bday-score" class="score-val">7</span></div>
    </div>
  </div>
</div>

<canvas id="fireworksCanvas"></canvas>
<canvas id="stand-crowd"></canvas>

<div class="light-group left">
  <div class="light-row"><div class="light"></div><div class="light"></div></div>
  <div class="light-row"><div class="light"></div><div class="light"></div></div>
</div>
<div class="light-group right">
  <div class="light-row"><div class="light"></div><div class="light"></div></div>
  <div class="light-row"><div class="light"></div><div class="light"></div></div>
</div>
<div id="stands"></div>
<div id="ground-seats"></div>
<div id="field"></div>
<div id="instruction">タイミングよく画面をクリックして打て！</div>

<div id="main-message">
  特大ホームラン！！<br>
  <div id="sub-message">〇〇、お誕生日おめでとう！</div>
</div>

<div id="ball"></div>
<div id="bat-container"><div id="bat"></div></div>

<script>
  // --- ★音声合成（Web Audio API）の処理★ ---
  let audioCtx;

  // ブラウザのロックを確実に解除するための初期化
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  // 0. 空振り音（AudioContextを確実にアクティブにするため追加）
  function playSwingSound() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime + 0.01; // Safari対策で少し未来を指定
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(200, now);
    osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.1);
  }

  // 1. 爆発音
  function playExplosionSound() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime + 0.01;
    const bufferSize = audioCtx.sampleRate * 2;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 600 + Math.random() * 300; 
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.4, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
    noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
    noise.start(now);
  }

  // 2. カキーン音
  function playHitSound() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime + 0.01;
    const osc = audioCtx.createOscillator();
    osc.type = 'triangle'; 
    osc.frequency.setValueAtTime(1200, now); 
    osc.frequency.exponentialRampToValueAtTime(800, now + 0.1); 
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.8, now); // 音量少しアップ
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2); 
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.2);
  }

  // 3. 歓声
  function playCheerSound() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime + 0.01;
    const bufferSize = audioCtx.sampleRate * 4; 
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    let lastOut = 0;
    for (let i = 0; i < bufferSize; i++) { 
      const white = Math.random() * 2 - 1;
      data[i] = (lastOut + (0.02 * white)) / 1.02; 
      lastOut = data[i];
      data[i] *= 3; 
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass'; 
    filter.frequency.value = 1000;
    filter.Q.value = 1;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.001, now); 
    gain.gain.linearRampToValueAtTime(0.4, now + 0.5); // 音量少しアップ
    gain.gain.exponentialRampToValueAtTime(0.001, now + 4); 
    noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
    noise.start(now);
  }

  // --- 点群観客の描画処理 ---
  const crowdCanvas = document.getElementById('stand-crowd');
  const crowdCtx = crowdCanvas.getContext('2d');
  
  function resizeCanvas() {
    crowdCanvas.width = window.innerWidth;
    crowdCanvas.height = window.innerHeight;
    drawCrowd(); 
  }
  window.addEventListener('resize', resizeCanvas);
  
  const dots = [];
  const crowdColors = ['#ff4', '#4ff', '#f4f', '#fff']; 

  function drawCrowd() {
    dots.length = 0;
    const stands = document.getElementById('stands');
    const standsRect = stands.getBoundingClientRect();
    const field = document.getElementById('field');
    const fieldRect = field.getBoundingClientRect();
    
    for (let i = 0; i < 2000; i++) {
      const x = Math.random() * crowdCanvas.width;
      const areaTop = standsRect.top;
      const areaHeight = fieldRect.top - standsRect.top;
      let baseY = areaTop + Math.random() * areaHeight; 
      const randomNoise = (Math.random() - 0.5) * 120; 
      let y = baseY + randomNoise;
      
      if (y < areaTop - 50) continue;
      if (y > fieldRect.top + 30) continue;

      dots.push({
        x: x, y: y,
        color: crowdColors[Math.floor(Math.random() * crowdColors.length)],
        size: 1 + Math.random() * 1.5,
        blinkSpeed: 0.01 + Math.random() * 0.03, alpha: Math.random()
      });
    }
  }

  function animateCrowd() {
    crowdCtx.clearRect(0, 0, crowdCanvas.width, crowdCanvas.height);
    dots.forEach(dot => {
      dot.alpha += dot.blinkSpeed;
      if (dot.alpha > 1 || dot.alpha < 0) { dot.blinkSpeed *= -1; }
      crowdCtx.globalAlpha = Math.max(0, dot.alpha); crowdCtx.fillStyle = dot.color;
      crowdCtx.beginPath(); crowdCtx.arc(dot.x, dot.y, dot.size, 0, Math.PI * 2); crowdCtx.fill();
    });
    requestAnimationFrame(animateCrowd);
  }

  resizeCanvas(); animateCrowd();

  // --- 野球ゲームの処理 ---
  const ball = document.getElementById('ball');
  const bat = document.getElementById('bat');
  const instruction = document.getElementById('instruction');
  const mainMessage = document.getElementById('main-message');
  const bdayScore = document.getElementById('bday-score');
  const fireworksCanvas = document.getElementById('fireworksCanvas');
  const fwCtx = fireworksCanvas.getContext('2d');
  
  function resizeFwCanvas() { fireworksCanvas.width = window.innerWidth; fireworksCanvas.height = window.innerHeight; }
  window.addEventListener('resize', resizeFwCanvas);
  resizeFwCanvas();

  let isThrowing = false; let isHit = false; let ballY = 40; let ballScale = 0.2; let pitchInterval;

  function pitchBall() {
    if (isHit) return;
    isThrowing = true; ball.style.display = 'block'; ballY = 40; ballScale = 0.2;
    ball.style.top = ballY + '%'; ball.style.transform = `translate(-50%, -50%) scale(${ballScale})`;
    
    pitchInterval = setInterval(() => {
      if (isHit) return;
      ballY += 1.2; ballScale += 0.015;
      ball.style.top = ballY + '%'; ball.style.transform = `translate(-50%, -50%) scale(${ballScale})`;
      
      if (ballY > 95) {
        clearInterval(pitchInterval); ball.style.display = 'none'; isThrowing = false;
        setTimeout(pitchBall, 1500);
      }
    }, 20);
  }

  document.body.addEventListener('mousedown', swingBat);
  document.body.addEventListener('touchstart', swingBat, {passive: false});

  function swingBat(e) {
    initAudio(); // 音声の初期化・ロック解除
    
    if (isHit) return;
    bat.classList.add('swing');
    setTimeout(() => { bat.classList.remove('swing'); }, 150);
    
    playSwingSound(); // ★空振り音を鳴らす

    if (isThrowing && ballY >= 60 && ballY <= 90) { hitHomerun(); }
  }

  function hitHomerun() {
    isHit = true; clearInterval(pitchInterval); instruction.style.display = 'none'; 
    playHitSound();

    let hitInterval = setInterval(() => {
      ballY -= 3; ballScale -= 0.01; 
      ball.style.top = ballY + '%'; ball.style.transform = `translate(-50%, -50%) scale(${ballScale})`;
      
      if (ballY < 20) {
        clearInterval(hitInterval);
        const rect = ball.getBoundingClientRect();
        const startX = rect.left + rect.width / 2;
        const startY = rect.top + rect.height / 2;
        ball.style.display = 'none';
        startFireworksShow(startX, startY);
      }
    }, 20);
  }

  // --- 本格花火の処理 ---
  const particles = [];
  const fwColors = ['#ff4b4b', '#4bff4b', '#4b4bff', '#ffff4b', '#ff4bff', '#4bffff', '#ffffff'];

  class Particle {
    constructor(x, y, color, speedScale) {
      this.x = x; this.y = y; this.color = color;
      const angle = Math.random() * Math.PI * 2; const speed = Math.random() * speedScale + 1;
      this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
      this.alpha = 1; this.friction = 0.96; this.gravity = 0.03; this.history = [];   
    }
    update() {
      this.history.push({ x: this.x, y: this.y });
      if (this.history.length > 6) { this.history.shift(); }
      this.vx *= this.friction; this.vy *= this.friction; this.vy += this.gravity;
      this.x += this.vx; this.y += this.vy; this.alpha -= 0.015; 
    }
    draw() {
      fwCtx.beginPath();
      if (this.history.length > 0) {
        fwCtx.moveTo(this.history[0].x, this.history[0].y);
        for (let i = 1; i < this.history.length; i++) { fwCtx.lineTo(this.history[i].x, this.history[i].y); }
      } else { fwCtx.moveTo(this.x, this.y); fwCtx.lineTo(this.x, this.y); }
      fwCtx.strokeStyle = this.color; fwCtx.lineWidth = 3; fwCtx.lineCap = 'round';
      fwCtx.globalAlpha = this.alpha; fwCtx.stroke();
    }
  }

  function createFirework(x, y, particleCount) {
    const color = fwColors[Math.floor(Math.random() * fwColors.length)];
    for (let i = 0; i < particleCount; i++) {
      const finalColor = Math.random() > 0.8 ? '#ffffff' : color;
      particles.push(new Particle(x, y, finalColor, 8));
    }
    playExplosionSound();
  }

  let isFireworksAnimating = false;
  function animateFireworks() {
    if (!isFireworksAnimating && particles.length === 0) return;
    fwCtx.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i]; p.update(); p.draw();
      if (p.alpha <= 0) { particles.splice(i, 1); }
    }
    requestAnimationFrame(animateFireworks);
  }

  function startFireworksShow(startX, startY) {
    isFireworksAnimating = true;
    animateFireworks();
    playCheerSound();
    createFirework(startX, startY, 150);

    setTimeout(() => {
      bdayScore.style.color = '#FF1493'; 
      bdayScore.style.textShadow = '0 0 20px #FFF';
      bdayScore.innerText = '8'; 
      setTimeout(() => {
        bdayScore.style.color = '#FFF';
        bdayScore.style.textShadow = '0 0 10px #FFD700';
      }, 500);
    }, 1500);

    let showTime = 0;
    const showInterval = setInterval(() => {
      const fireworkCount = Math.floor(Math.random() * 3) + 2; 
      for(let i = 0; i < fireworkCount; i++) {
        const x = Math.random() * fireworksCanvas.width;
        const y = Math.random() * (fireworksCanvas.height * 0.4) + 50; 
        setTimeout(() => { createFirework(x, y, 100); }, Math.random() * 200);
      }
      showTime += 800;
      
      if (showTime >= 7200) {
        clearInterval(showInterval);
        setTimeout(() => {
          mainMessage.classList.add('show-message'); 
        }, 1500); 
      }
    }, 800);
  }

  setTimeout(pitchBall, 1000);
</script>
</body>
</html>
